services:

  # Nginx Reverse Proxy - https://github.com/nginx/nginx
  nginx:
    image: nginx:1.29.7-alpine@sha256:e7257f1ef28ba17cf7c248cb8ccf6f0c6e0228ab9c315c152f9c203cd34cf6d1
    container_name: nginx
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - NGINX_ENVSUBST_FILTERED_VAR_NAMES=SECRET_DOMAIN SECRET_CERT_NAME
      - SECRET_CERT_NAME=${SECRET_CERT_NAME}
    volumes:
      - /opt/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/docker/nginx/templates:/etc/nginx/templates:ro
      - /opt/docker/nginx/includes:/etc/nginx/includes:ro
      - /opt/docker/certbot/certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: &default-logging # default logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Certbot - https://github.com/cloudflare/certbot-dns-cloudflare
  certbot:
    image: certbot/dns-cloudflare:v5.5.0@sha256:f90db06a98b61bd221fe5a9688d0bb975b444760ef677cb4369ffc2a8a16e579
    container_name: certbot
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - SECRET_CERT_NAME=${SECRET_CERT_NAME}
      - SECRET_CERT_DOMAINS=srv.${SECRET_DOMAIN},*.srv.${SECRET_DOMAIN}
    volumes:
      - /opt/docker/certbot/certs:/etc/letsencrypt
      - /opt/docker/certbot/cloudflare.ini:/cloudflare.ini:ro
      - /opt/docker/certbot/certbot-entrypoint.sh:/entrypoint.sh:ro
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "openssl x509 -checkend 86400 -noout -in /etc/letsencrypt/live/${SECRET_CERT_NAME}/fullchain.pem || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    logging: *default-logging

  # SABnzbd - https://hub.docker.com/r/linuxserver/sabnzbd
  sabnzbd:
    image: linuxserver/sabnzbd:version-4.5.5@sha256:f0abed8e9450d5b71631a89b663fbfbfbb6909b254f94911c7e77162a3827854
    container_name: sabnzbd
    volumes:
      - /opt/docker/sabnzbd/config:/config
      - /opt/docker/sabnzbd/scripts:/scripts
      - /mnt/data/usenet:/data/usenet
      - /mnt/download-temp:/incomplete
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
      - UMASK=002
    networks:
      - arr_network
    expose:
      - 8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # Seerr - https://github.com/seerr-team/seerr
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.1.0@sha256:b35ba0461c4a1033d117ac1e5968fd4cbe777899e4cbfbdeaf3d10a42a0eb7e9
    container_name: seerr
    init: true
    depends_on:
      - "radarr"
      - "sonarr"
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - LOG_LEVEL=info
      - PORT=5055
    expose:
      - 5055
    networks:
      - arr_network
    volumes:
      - /opt/docker/seerr/config:/app/config
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 5
    logging: *default-logging
    

  # Radarr - https://hub.docker.com/r/linuxserver/radarr
  radarr:
    image: linuxserver/radarr:version-6.1.1.10360@sha256:581f159c2b67436863cb4da30e158ef6f6b8878472abbba79ee5d5f7e6b7d28d
    container_name: radarr
    depends_on:
      - "prowlarr"
      - "sabnzbd"
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
      - UMASK=002
    volumes:
      - /opt/docker/radarr/config:/config
      - /mnt/data:/data
    expose:
      - 7878
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7878/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # Radarr - https://hub.docker.com/r/linuxserver/radarr
  radarr-list:
    image: linuxserver/radarr:version-6.1.1.10360@sha256:581f159c2b67436863cb4da30e158ef6f6b8878472abbba79ee5d5f7e6b7d28d
    container_name: radarr-list
    depends_on:
      - "prowlarr"
      - "sabnzbd"
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
      - UMASK=002
    volumes:
      - /opt/docker/radarr-list/config:/config
      - /mnt/data:/data
    expose:
      - 7878
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7878/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # Sonarr - https://hub.docker.com/r/linuxserver/sonarr
  sonarr:
    image: linuxserver/sonarr:version-4.0.16.2944@sha256:21c1c3d52248589bb064f5adafec18cad45812d7a01d317472955eef051e619b
    container_name: sonarr
    depends_on:
      - "prowlarr"
      - "sabnzbd"
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
      - UMASK=002
    volumes:
      - /opt/docker/sonarr/config:/config
      - /mnt/data:/data
    expose:
      - 8989
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # Prowlarr - Indexer Management - https://github.com/Prowlarr/Prowlarr
  prowlarr:
    image: linuxserver/prowlarr:version-2.3.0.5236@sha256:e50f3b188a7d1771b61f395c4203e35476bd3047683508740305e830e15bacf7
    container_name: prowlarr
    depends_on:
      - "umlautadaptarr"
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
    volumes:
      - /opt/docker/prowlarr/data:/config
    expose:
      - 9696
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9696/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # VPN Container for qBittorrent with WireGuard and ProtonVPN
  gluetun-qbit:
    image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
    container_name: gluetun-qbit
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${QBIT_PROTON_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${QBIT_PROTON_ADDRESSES}
      - SERVER_COUNTRIES=${QBIT_PROTON_COUNTRIES}
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
    volumes:
      - /opt/docker/gluetun-qbit:/tmp/gluetun
    expose:
      - 8080 # qBittorrent WebUI
      - 9000 # TheLounge WebUI
      - 80   # Speedtest-Tracker
    networks:
      - arr_network
    restart: unless-stopped
    #healthcheck:
    #  test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/v1/vpn/status | grep -q 'up'"]
    #  interval: 30s
    #  timeout: 10s
    #  retries: 3
    logging: *default-logging

  # Sidecar Container to Sync qBittorrent Port Forwarding with Gluetun
  qbit-port-sync:
    image: alpine:3.23.3@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
    container_name: qbit-port-sync
    network_mode: "service:gluetun-qbit"
    depends_on:
      gluetun-qbit:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    volumes:
      - /opt/docker/gluetun-qbit:/tmp/gluetun:ro
      - /opt/docker/qbit/qbit-port-sync.sh:/sync.sh:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl jq && sh /sync.sh && echo 'Port gesetzt, schlafe jetzt...' && sleep infinity"]
    healthcheck:
      test: ["CMD-SHELL", "[ -f /tmp/gluetun/forwarded_port ] || exit 1"] 
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  # Torrent Downloader
  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:release-5.1.4@sha256:d1c1ede6ca40b6ce79879ffa80d2c35e1eb71bc56b20f5336a1d80c46fc1cdb0
    container_name: qbittorrent
    depends_on:
      gluetun-qbit:
        condition: service_healthy
    network_mode: "service:gluetun-qbit"
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
      - UMASK=002
      - VPN_ENABLED=false
      #- VPN_PORT_FORWARDING=true
      #- VPN_PORT_FORWARDING_PROVIDER=protonvpn
    volumes:
      - /opt/docker/qbit:/config
      - /mnt/data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/app/version"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # Qbit Torrent WebUI - Automation
  qui:
    image: ghcr.io/autobrr/qui:v1.15.0@sha256:da33f8c850f7d6f1bfaee26b9553b21411e872639d54193906fa2cec51af1d0f
    container_name: qui
    volumes:
      - /opt/docker/qui:/config
      - /mnt/data:/data
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
    expose:
      - 7476
    networks:
      - arr_network
    restart: unless-stopped
    #healthcheck:
    #  test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/app/version"]
    #  interval: 30s
    #  timeout: 10s
    #  retries: 3
    logging: *default-logging

  # Torrent And RSS Automation
  autobrr:
    image: ghcr.io/autobrr/autobrr:v1.75.1@sha256:712cf8ffa11eba28e286d632dc8ad6b17fb6d754573848a07ec91043eb03d87e
    container_name: autobrr
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
    volumes:
      - /opt/docker/autobrr:/config
    expose:
      - 7474
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
  
  # IRC-Chat for Private Trackers
  thelounge:
    image: ghcr.io/thelounge/thelounge:4.4.3@sha256:c2aa0916203b298ffaf3a36c4eb60ef73c1006448d430e218d37840472e84e50
    container_name: thelounge
    network_mode: "service:gluetun-qbit"
    environment:
      - TZ=Europe/Berlin
    volumes:
      - thelounge:/var/opt/thelounge
    restart: unless-stopped
    #healthcheck:
    #  test: ["CMD", "curl", "-f", "http://localhost:7474/api/health"]
    #  interval: 30s
    #  timeout: 5s
    #  retries: 3
    logging: *default-logging

  # IRC-Chat for Private Trackers
  speedtest-tracker-qbit-vpn:
    image: lscr.io/linuxserver/speedtest-tracker:1.13.12@sha256:2af8df42ae2e32d162ce9230002e726789700e38e527e9c74a746aa983b86888
    container_name: speedtest-tracker-qbit-vpn
    network_mode: "service:gluetun-qbit"
    env_file: /opt/docker/secrets.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - APP_KEY=V/6B2h+w+0q8p8fIZghKpYogEntRL5i4PdIdGsbszn0=
      - APP_URL=https://speedtest-qbit.{SECRET_CERT_NAME}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=0 */2 * * *
      - #SPEEDTEST_SERVERS=
      - ADMIN_EMAIL=admin@{SECRET_DOMAIN}
      - ADMIN_PASSWORD=admin
      - DB_HOST= #optional
      - DB_PORT= #optional
      - DB_DATABASE= #optional
      - DB_USERNAME= #optional
      - DB_PASSWORD= #optional
      - DISPLAY_TIMEZONE=Europe/Berlin #optional
      - PRUNE_RESULTS_OLDER_THAN=0 #optional
    volumes:
      - /opt/docker/speedtest-tracker:/config
    restart: unless-stopped
    #healthcheck:
    #  test: ["CMD", "curl", "-f", "http://localhost:7474/api/health"]
    #  interval: 30s
    #  timeout: 5s
    #  retries: 3
    logging: *default-logging

  # Uploader for Torrent Trackers
#  cross-seed:
#    image: ghcr.io/cross-seed/cross-seed:6.13.6@sha256:e2bf5b593e4e7d699e6242423ad7966190cd52ba8eefafdfdbb0cb5b0b609b96
#    container_name: cross-seed
#    env_file: /opt/docker/secrets.env
#    command: daemon
#    user: "3006:3006"
#    environment:
#      - TZ=Europe/Berlin
#      - PUID=3006
#      - PGID=3006
#    volumes:
#      - /opt/docker/cross-seed:/config
#      - /mnt/data:/data
#    expose:
#      - 2468
#    networks:
#      - arr_network
#    restart: unless-stopped
#    #healthcheck:
#    #  test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q 'cross-seed'"]
#    #  interval: 1m
#    #  timeout: 10s
#    #  retries: 3
#    logging: *default-logging

  # Uploader for Private Torrent Trackers (RHD)
  uppollo:
    image: uppollo/uppollo:v1.12.1@sha256:2dc2a3e3ff80ed91f14b6c463b6bd39a41aa9238892f37671413f2541c11504e
    container_name: uppollo
    command: serve
    volumes:
      - /opt/docker/uppollo:/home/uppollo/.config/upPollo
      - /data/content:/data/content:ro 
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
    networks:
      - arr_network
    expose:
      - 9999
    restart: unless-stopped
    #healthcheck:
    #  test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    #  interval: 30s
    #  timeout: 10s
    #  retries: 3
    logging: *default-logging
    
  # Notifiarr - https://github.com/Notifiarr/notifiarr
  notifiarr:
    image: golift/notifiarr:v0.9.5@sha256:a9a1f37f924d740107874675df6b6a5edd87e5f66ca72ad27481a4bdfd42d162
    container_name: notifiarr
    volumes:
      - /opt/docker/notifiarr/conf:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id:ro
    expose:
      - 5454
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5454/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # MediathekArr - Indexer & Downloader for Mediathek Content - https://github.com/PCJones/MediathekArr
  mediathekarr:
    image: pcjones/mediathekarr:beta@sha256:333f2adbd3d93d196a8a548d2b9b5e70e9172407afc418afcfa5d49ca8c250c9
    container_name: mediathekarr
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - PUID=3006
      - PGID=3006
      - DOWNLOAD_INCOMPLETE_PATH=/data/mediathek/incomplete # Path to incomplete downloads
      - DOWNLOAD_COMPLETE_PATH=/data/mediathek/complete # Path to complete downloads"
    volumes:
      - /opt/docker/mediathekarr:/app/config
      - /mnt/data/mediathek:/data/mediathek # Mount for Mediathek Downloader
    expose:
      - 5007
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5007/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # Umlautadaptarr - https://github.com/PCJones/UmlautAdaptarr
  umlautadaptarr:
    image: pcjones/umlautadaptarr:0.7.5@sha256:2c6689d49afe51fcaa5e8a27e139855e0c8782e1e42ec595d8694b74094f991f
    container_name: umlautadaptarr
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - SONARR__ENABLED=true
      - SONARR__HOST=http://sonarr:8989
      - SONARR__APIKEY=${SONARR_API_KEY}
      - RADARR__ENABLED=true
      - RADARR__HOST=http://radarr:7878
      - RADARR__APIKEY=${RADARR_API_KEY}
    expose:
      - 5006
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5006/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # tracearr - https://github.com/connorgallopo/Tracearr/
  tracearr:
    image: ghcr.io/connorgallopo/tracearr:supervised-1.4.17@sha256:32ad3865de40380aa48390e30d8834795c18f78e3e4b3357a13c7f7e8d4b7527
    container_name: tracearr
    shm_size: 512mb  # Required for PostgreSQL shared memory (increase for large imports)
    mem_limit: 3g    # Minimum 3GB required (PostgreSQL + Redis + Node.js)
    ulimits:
      nofile:
        soft: 65536
        hard: 65536 
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - LOG_LEVEL=info
    volumes:
      - tracearr_postgres:/data/postgres
      - tracearr_redis:/data/redis
      - tracearr_data:/data/tracearr
    expose:
      - 3000
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging: *default-logging

  # Episeerr - https://github.com/vansmak/episeerr
  episeerr:
    image: vansmak/episeerr:3.6.0@sha256:d46e6b52817c2af0b11dcf61e27024498d01afa613c57f5ac34412c83ab6cadc
    container_name: episeerr
    depends_on:
      - "sonarr"
    env_file: /opt/docker/secrets.env
    environment:
      - TZ=Europe/Berlin
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - JELLYSEERR_URL=http://seerr:5055
      - JELLYSEERR_API_KEY=${JELLYSEERR_API_KEY}
      - JELLYFIN_URL=https://jellyfin.srv.seifert.dev:8920
      - JELLYFIN_API_KEY=${EPISEERR_JELLYFIN_API_KEY}
      - JELLYFIN_USER_ID=
      - CUSTOMAPP_URL=http://sabnzbd:8080
      - CUSTOMAPP_NAME=SABNZBD
      - CUSTOMAPP_ICON=fas fa-cog
    volumes:
      - /opt/docker/episeerr/config:/app/config
      - /opt/docker/episeerr/logs:/app/logs
      - /opt/docker/episeerr/data:/app/data
      - /opt/docker/episeerr/temp:/app/temp
    expose:
      - 5002
    networks:
      - arr_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5002/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
    container_name: flaresolverr
    environment:
      - TZ=Europe/Berlin
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TIMEZONE=Europe/Berlin
    networks:
      - arr_network
    expose:
      - 8191
    restart: unless-stopped
    logging: *default-logging

  # Crowdsec AppSec for Arrstack
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.7@sha256:6ca53ad26196ca59ddd4fa692a586b73d8fcde085046163b9ca2f04887dca563
    container_name: crowdsec
    networks:
      - arr_network
    restart: unless-stopped
    env_file: /opt/docker/secrets.env
    environment:
      TZ: Europe/Berlin
      ENROLL_TAGS: docker
      GID: "1000"
      DISABLE_LOCAL_API: true
      LOCAL_API_URL: ${CROWDSEC_LAPI_URL}                   # Crowdsec Central LAPI URL https://example.com:8443
      AGENT_USERNAME: ${CROWDSEC_LAPI_USERNAME}             # Crowdsec Maschine Username
      AGENT_PASSWORD: ${CROWDSEC_LAPI_KEY}             # Crowdsec Maschine Password
      COLLECTIONS: crowdsecurity/linux crowdsecurity/nginx crowdsecurity/base-http-scenarios LePresidente/jellyseerr
      PARSERS: crowdsecurity/whitelists
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/docker/crowdsec/acquis.d:/etc/crowdsec/acquis.d
      - /opt/docker/crowdsec/data:/var/lib/crowdsec/data
    logging: *default-logging

volumes:
  tracearr_postgres:
  tracearr_redis:
  tracearr_data:
  thelounge:
  
networks:
  arr_network:
    name: arr_network
    external: false

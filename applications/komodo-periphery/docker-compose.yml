services:
  periphery:
    image: ghcr.io/moghtech/komodo-periphery:1.19.5@sha256:bd79cf960ed054fe8e02384322303e462448679b1149dde48bbef151417255b1
    container_name: komodo-periphery
    labels:
      komodo.skip:
    restart: unless-stopped
    network_mode: host
    environment:
      PERIPHERY_ROOT_DIRECTORY: /etc/komodo
      PERIPHERY_ALLOWED_IPS: 172.16.10.18
      PERIPHERY_PASSKEYS: ${PERIPHERY_PASSKEY} # over .env
      PERIPHERY_SSL_ENABLED: true
      PERIPHERY_DISABLE_TERMINALS: false
      PERIPHERY_INCLUDE_DISK_MOUNTS: /etc/hostname
      PERIPHERY_LOGGING_LEVEL: "warn"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /etc/komodo:/etc/komodo:rw
      - /opt/docker:/opt/docker:rw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
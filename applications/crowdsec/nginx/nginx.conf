user nginx;
worker_processes auto;
worker_rlimit_nofile 10240;

events {
    use epoll;
    multi_accept on;
    worker_connections  4096;
}

http {
  resolver 127.0.0.11 ipv6=off;
  server_tokens off;

  # Extend Bucket-Size for Server-Names
  server_names_hash_bucket_size 64;
  # Default Mime-Types
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Real-IP-Settings
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # --- Rate Limit Logik ---
  map $remote_addr $is_home_ip {
      default 0;
      include /etc/nginx/admin.conf/map_whitelist.conf;
  }

  map $is_home_ip $limit_key {
      1 "";                   # Home-IP -> leerer Key -> kein Rate Limit
      0 $binary_remote_addr;  # Fremde IP -> Key gesetzt -> Rate Limit aktiv
  }

  limit_req_zone $limit_key zone=lapi_limit:10m rate=10r/s;

  include /etc/nginx/conf.d/*.conf;
}
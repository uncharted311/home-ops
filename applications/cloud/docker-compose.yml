services:
  # Nginx Reverse Proxy - https://github.com/nginx/nginx
  nginx:
    image: nginx:1.31.1-alpine
    container_name: nginx
    env_file: /opt/docker/secrets.env
    environment:
      - NGINX_ENVSUBST_FILTERED_VAR_NAMES=SECRET_DOMAIN SECRET_CERT_NAME
      - SECRET_CERT_NAME=${SECRET_CERT_NAME}
    volumes:
      - /opt/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/docker/nginx/templates:/etc/nginx/templates:ro
      - /opt/docker/nginx/includes:/etc/nginx/includes:ro
      - /opt/docker/certbot/certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nextcloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: &default-logging # default logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Certbot - https://github.com/cloudflare/certbot-dns-cloudflare
  certbot:
    image: certbot/dns-cloudflare:v5.6.0
    container_name: certbot
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    env_file: /opt/docker/secrets.env
    environment:
      - SECRET_CERT_NAME=${SECRET_CERT_NAME}
    volumes:
      - /opt/docker/certbot/certs:/etc/letsencrypt
      - /opt/docker/certbot/cloudflare.ini:/cloudflare.ini:ro
      - /opt/docker/certbot/certbot-entrypoint.sh:/entrypoint.sh:ro
    networks:
      - nextcloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "openssl x509 -checkend 86400 -noout -in /etc/letsencrypt/live/${SECRET_CERT_NAME}/fullchain.pem || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    logging: *default-logging

  nextcloud:
    image: nextcloud:34.0.0-apache
    container_name: nextcloud
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    env_file: /opt/docker/secrets.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      APACHE_SERVER_NAME: cloud.srv.${SECRET_DOMAIN}
      APC_ENABLE: 1
      PHP_MEMORY_LIMIT: 1024M
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
    volumes:
      - nextcloud.redis-data:/redis
      - /opt/docker/nextcloud/html:/var/www/html
      - /opt/docker/nextcloud/data:/var/www/html/data
      - /opt/docker/nextcloud/log:/var/log/nextcloud
      - /opt/docker/nextcloud/apache/security.conf:/etc/apache2/conf-enabled/security-custom.conf:ro
      - /opt/docker/nextcloud/apache/servername.conf:/etc/apache2/conf-enabled/servername.conf
      - /opt/docker/nextcloud/apache/proxy.conf:/etc/apache2/conf-enabled/proxy.conf:ro
      - /mnt/nas/heinrich:/mnt/heinrich
      - /mnt/nas/regina:/mnt/regina
      - /mnt/nas/seifert:/mnt/seifert
    expose:
      - 80
    networks:
      - nextcloud-net
    dns:
      - 172.16.10.254
      - 172.16.10.253
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging

  nextcloud-cron:
    image: nextcloud:34.0-apache@sha256:57ed47f00a275ee8a80d770c9510835060e3c7aabd4c75860d69253ecbbfa85c
    container_name: nextcloud-cron
    restart: unless-stopped
    entrypoint: /cron.sh
    depends_on:
      - postgres
      - redis
    volumes:
      - /opt/docker/nextcloud/html:/var/www/html
      - /opt/docker/nextcloud/data:/var/www/html/data
    networks:
      - nextcloud-net
    logging: *default-logging
  
  redis:
    container_name: redis
    image: redis:8.8.0-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    restart: unless-stopped
    command: >
      sh -c "
      mkdir -p /redis &&
      chown redis:redis /redis &&
      exec su redis -s /bin/sh -c '
        redis-server
          --save \"\"
          --appendonly no
          --unixsocket /redis/redis.sock
          --unixsocketperm 777
      '
      "
    volumes:
      - nextcloud.redis-data:/redis
    networks:
      - nextcloud-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  postgres:
    image: postgres:18.4-alpine@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88
    container_name: postgres
    volumes:
      - nextcloud.db-data:/var/lib/postgresql
    env_file: /opt/docker/secrets.env
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - nextcloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud -d nextcloud"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    logging: *default-logging

  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.8@sha256:2f527c9bb8b367120eb08b82890aa912ce96bfa1ada93dda0721700e4b4e0dde
    container_name: crowdsec
    restart: unless-stopped
    env_file: /opt/docker/secrets.env
    environment:
      ENROLL_TAGS: docker
      GID: "1000"
      DISABLE_LOCAL_API: true
      LOCAL_API_URL: ${CROWDSEC_LAPI_URL}                   # Crowdsec Central LAPI URL https://example.com:8443
      AGENT_USERNAME: ${CROWDSEC_LAPI_USERNAME}             # Crowdsec Maschine Username
      AGENT_PASSWORD: ${CROWDSEC_LAPI_KEY}             # Crowdsec Maschine Password
      COLLECTIONS: crowdsecurity/linux crowdsecurity/nginx crowdsecurity/base-http-scenarios crowdsecurity/nextcloud
      PARSERS: crowdsecurity/whitelists
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/docker/crowdsec/acquis.d:/etc/crowdsec/acquis.d
      - /opt/docker/crowdsec/data:/var/lib/crowdsec/data
      - /opt/docker/nextcloud/log:/var/log/nextcloud:ro
    networks:
      - nextcloud-net
    logging: *default-logging

volumes:
  nextcloud.db-data:
  nextcloud.redis-data:

networks:
  nextcloud-net:
    name: nextcloud-net
    external: false

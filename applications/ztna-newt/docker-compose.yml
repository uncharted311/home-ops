services:
  newt:
    image: fosrl/newt:1.12.3@sha256:414e1a7618cadba03aace19abe2fd5feaa1d7922b95d359d6c1e8329d3fa964c
    container_name: newt
    restart: unless-stopped
    env_file: /opt/docker/secrets.env
    environment:
      - LOG_LEVEL=INFO
      - PANGOLIN_ENDPOINT=https://${ZTNA_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "pgrep newt > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
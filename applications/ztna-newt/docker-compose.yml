services:
  newt:
    image: fosrl/newt:1.12.0@sha256:f63811250364e893d3de4c30e0227d650aa962c32b43bd0cd83427ffd03d99cc
    container_name: newt
    restart: unless-stopped
    env_file: /opt/docker/secrets.env
    environment:
      - LOG_LEVEL=INFO
      - PANGOLIN_ENDPOINT=https://${ZTNA_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "pgrep newt > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
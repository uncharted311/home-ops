services:
  newt:
    image: fosrl/newt:1.12.4@sha256:6369c0e0872d0634461ed477dea684431f4ddb92a9c30e485c07d1904623582d
    container_name: newt
    restart: unless-stopped
    env_file: /opt/docker/secrets.env
    environment:
      - LOG_LEVEL=INFO
      - PANGOLIN_ENDPOINT=https://${ZTNA_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "pgrep newt > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
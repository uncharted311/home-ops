services:
  newt:
    image: fosrl/newt:1.11.0@sha256:ea9e2bc53850d4a8b2c6019d97172a2b3e3cb1a15412babb4a0f4adc522f4a79
    container_name: newt
    restart: unless-stopped
    env_file: /opt/docker/secrets.env
    environment:
      - LOG_LEVEL=INFO
      - PANGOLIN_ENDPOINT=https://${ZTNA_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "pgrep newt > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
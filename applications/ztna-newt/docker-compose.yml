services:
  newt:
    image: fosrl/newt:1.10.4@sha256:ccd2b0e9a0492d7492c00dff1295d0c487a2f71f9f8fc80b1c61e597f5181aed
    container_name: newt
    restart: unless-stopped
    env_file: /opt/docker/secrets.env
    environment:
      - LOG_LEVEL=INFO
      - PANGOLIN_ENDPOINT=https://${ZTNA_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "pgrep newt > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
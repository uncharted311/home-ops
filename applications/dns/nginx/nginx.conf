user nginx;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 10240;

events {
    use epoll;
    multi_accept on;
    worker_connections  4096;
}


# DNS over TLS (DoT) Performance-Tuning
stream {
    ssl_session_cache shared:SSL_DOT:20m;
    ssl_session_timeout 4h;

    upstream blocky_dns {
        server blocky:53;
    }

    server {
        listen 853 ssl;
        proxy_pass blocky_dns;
        
        # Pfad ist durch Docker-Volume-Mount auf beiden Nodes identisch!
        ssl_certificate /etc/letsencrypt/live/node-cert/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/node-cert/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
    }
}

# DNS over HTTPS (DoH)
http {
    resolver 127.0.0.11 ipv6=off;
    server_tokens off;
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_names_hash_bucket_size 64;

    ssl_session_cache shared:SSL_DOH:20m;
    ssl_session_timeout 4h;
    ssl_buffer_size 4k; # Optimiert für kleine DNS-Pakete

    # Default Mime-Types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    # Real-IP-Settings
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Healthcheck
    server {
        listen 80;
        server_name localhost;
        location /health {
            access_log off;
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }
    }

    server {
        listen 443 ssl;
        http2 on; # Essentiell für DoH Geschwindigkeit

        ssl_certificate /etc/letsencrypt/live/node-cert/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/node-cert/privkey.pem;

        location /dns-query {
            proxy_pass http://blocky:4000/dns-query;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}